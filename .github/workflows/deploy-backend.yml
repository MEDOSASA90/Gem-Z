name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # We copy only necessary files for production
      - name: Prepare production files
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          # If you have other folders like templates etc., copy them here

      - name: Deploy Backend via FTP (LFTP)
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          sudo apt-get purge -y needrestart || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq lftp
          lftp -c "set ftp:ssl-allow yes; set ssl:verify-certificate no; open -u $FTP_USERNAME,'$FTP_PASSWORD' $FTP_SERVER; lcd backend/dist; mirror -R -v -P 5 ./ public_html/api/"
