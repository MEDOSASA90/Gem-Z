name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - staging
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      # We copy only necessary files for production
      - name: Prepare production files
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          # If you have other folders like templates etc., copy them here

      - name: Deploy to Hostinger FTP (Backend)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/api/
          local-dir: ./backend/deploy/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
