name: Deploy Frontend to Hostinger

on:
  push:
    branches:
      - staging
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Export
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://api.gem-z.shop/api/v1"

      - name: Deploy Frontend via FTP (LFTP)
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          sudo apt-get purge -y needrestart || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq lftp
          echo "machine $FTP_SERVER login $FTP_USERNAME password $FTP_PASSWORD" > ~/.netrc
          chmod 600 ~/.netrc
          lftp -c "set ftp:ssl-allow yes; set ssl:verify-certificate no; open $FTP_SERVER; mirror -R -v -P 5 out/ ./"
