name: Deploy to Production Branch
on:
  push:
    branches:
      - staging
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install Dependencies (Frontend)
        run: npm ci
        working-directory: ./frontend
      - name: Build Static Export (Frontend)
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: "https://api.gem-z.shop/api/v1"
      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./backend/package-lock.json
      - name: Install Dependencies (Backend)
        run: npm ci
        working-directory: ./backend
      - name: Build TypeScript (Backend)
        run: npm run build
        working-directory: ./backend
      - name: Prepare Backend Dist
        run: |
          cp package*.json dist/
          cd dist
          npm ci --omit=dev
        working-directory: ./backend
      - name: Merge Artifacts for Deployment
        run: |
          mkdir -p deploy_root
          cp -r frontend/out/* deploy_root/
          mkdir -p deploy_root/api
          cp -r backend/dist/* deploy_root/api/
      - name: Deploy to Production Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_root
          publish_branch: production
          force_orphan: true

