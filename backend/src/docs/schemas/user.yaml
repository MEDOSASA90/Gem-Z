schemas:
  # ─── Update Profile Request ────────────────────────────────────
  UpdateProfileRequest:
    type: object
    properties:
      fullName:
        type: string
        minLength: 2
        example: "Ahmed Mohamed"
      phone:
        type: string
        example: "+201012345678"
      gender:
        type: string
        enum: [male, female]
      dob:
        type: string
        format: date
        example: "1995-03-15"
      fitnessLevel:
        type: string
        enum: [beginner, intermediate, advanced]
      countryCode:
        type: string
        example: "+20"
      avatarBase64:
        type: string
        description: Base64-encoded avatar image

  # ─── Change Password Request ───────────────────────────────────
  ChangePasswordRequest:
    type: object
    required: [currentPassword, newPassword]
    properties:
      currentPassword:
        type: string
        format: password
        example: "OldPass123!"
        description: Current password
      newPassword:
        type: string
        format: password
        minLength: 8
        example: "NewStrongPass456!"
        description: New password (minimum 8 characters)

  # ─── KYC Submission Request ────────────────────────────────────
  KYCRequest:
    type: object
    required: [idFront, idBack, selfie]
    properties:
      idFront:
        type: string
        description: Base64-encoded front of national ID
      idBack:
        type: string
        description: Base64-encoded back of national ID
      selfie:
        type: string
        description: Base64-encoded selfie photo for liveness check
      documentType:
        type: string
        enum: [national_id, passport, driving_license]
        default: national_id
      idNumber:
        type: string
        example: "28501234567891"
        description: National ID number

  # ─── User Profile Response ─────────────────────────────────────
  UserProfile:
    allOf:
      - $ref: '#/components/schemas/User'
      - type: object
        properties:
          wallet:
            $ref: '#/components/schemas/Wallet'
          stats:
            type: object
            properties:
              totalWorkouts:
                type: integer
                example: 42
              totalSessions:
                type: integer
                example: 15
              streakDays:
                type: integer
                example: 7
              totalCoins:
                type: integer
                example: 1250
